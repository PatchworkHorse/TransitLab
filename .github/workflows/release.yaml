on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version name for the package (e.g., v1.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.base_ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      - name: Build binary
        working-directory: src
        run: go build -o ../netemu .

      - name: Package release
        run: |
          # Use the manual input version if available, otherwise fallback to the git tag name
          VERSION="${{ inputs.version || github.ref_name }}"

          mkdir -p dist/netemu
          cp netemu dist/netemu/
          cp docker-compose.yml dist/netemu/
          cp customer-templates.yml router-templates.yml dist/netemu/
          cp AS-*.yml dist/netemu/
          cp README.md dist/netemu/
          cp -r customer-image frr-image server-image scripts dist/netemu/

          tar -czf netemu-${VERSION}-linux-amd64.tar.gz -C dist netemu

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: netemu-${{ inputs.version || github.ref_name }}-linux-amd64.tar.gz
          tag_name: ${{ inputs.version || github.ref_name }}
